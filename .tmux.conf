# --- Defaults ---

# Modern terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse support (resize panes, scroll, select windows)
set -g mouse on

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Larger scrollback
set -g history-limit 50000

# No delay on escape (critical for vim users)
set -sg escape-time 0

# macOS clipboard integration
set -g set-clipboard on
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
setw -g mode-keys vi

# Set terminal title to window name (visible in iTerm2 -CC tab bar)
set -g set-titles on
set -g set-titles-string '#W'

# Focus events (needed for vim autoread, direnv, etc.)
set -g focus-events on

# Silence bells
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# --- Status Bar ---

set -g status-position top
set -g status-interval 5

# Muted colors (won't fight powerlevel10k)
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#89b4fa,bold] #S #[default]| "

# Right: path + time
set -g status-right-length 60
set -g status-right "#[fg=#a6adc8]#{pane_current_path} #[fg=#89b4fa]| %H:%M "

# Window tabs
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W "

# --- Key Bindings ---

# Splits (visual mnemonics, inherit current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window inherits current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Session management
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind f choose-tree -Zs
bind X confirm-before -p "Kill session? (y/n)" kill-session
bind D switch-client -t dev
bind M switch-client -t mind

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- Plugins ---

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Resurrect: save/restore pane contents
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
